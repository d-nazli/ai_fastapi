<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliumAI Backend Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        text-align: center;
        font-size: 1.8rem;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        text-align: center;
        color: #94a3b8;
        margin-bottom: 32px;
        font-size: 0.9rem;
      }
      .status-bar {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }
      .status-chip {
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .status-chip .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .chip-ok {
        background: #065f46;
        color: #6ee7b7;
      }
      .chip-ok .dot {
        background: #34d399;
      }
      .chip-err {
        background: #7f1d1d;
        color: #fca5a5;
      }
      .chip-err .dot {
        background: #f87171;
      }
      .chip-wait {
        background: #1e3a5f;
        color: #93c5fd;
      }
      .chip-wait .dot {
        background: #60a5fa;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 0;
      }
      .tab {
        padding: 10px 24px;
        background: #1e293b;
        border: 1px solid #334155;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        cursor: pointer;
        color: #94a3b8;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.15s;
      }
      .tab.active {
        background: #1e293b;
        color: #e2e8f0;
        border-color: #6366f1;
        border-bottom: 2px solid #1e293b;
      }
      .tab:hover:not(.active) {
        color: #cbd5e1;
      }

      .panel {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 0 8px 8px 8px;
        padding: 24px;
        display: none;
      }
      .panel.active {
        display: block;
      }

      label {
        display: block;
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 4px;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px 14px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 0.9rem;
        margin-bottom: 14px;
        font-family: inherit;
        outline: none;
        transition: border 0.15s;
      }
      input:focus,
      textarea:focus {
        border-color: #6366f1;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .btn {
        padding: 10px 28px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.9rem;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-primary {
        background: #6366f1;
        color: #fff;
      }
      .btn-primary:hover {
        background: #4f46e5;
      }
      .btn-primary:disabled {
        background: #4338ca;
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: #334155;
        color: #e2e8f0;
      }
      .btn-secondary:hover {
        background: #475569;
      }

      .btn-group {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .result-area {
        margin-top: 20px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 16px;
        min-height: 120px;
        max-height: 500px;
        overflow-y: auto;
        font-size: 0.85rem;
        line-height: 1.6;
        white-space: pre-wrap;
        font-family: "Cascadia Code", "Fira Code", monospace;
      }
      .result-area.success {
        border-color: #22c55e;
      }
      .result-area.error {
        border-color: #ef4444;
      }
      .result-area .label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #64748b;
        margin-bottom: 8px;
        display: block;
      }
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #6366f180;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .timer {
        color: #f59e0b;
        font-weight: 600;
        font-size: 0.8rem;
        margin-left: 8px;
      }

      .section-title {
        color: #8b5cf6;
        font-weight: 700;
        font-size: 0.95rem;
        margin: 16px 0 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>IntelliumAI Backend Test Panel</h1>
      <p class="subtitle">
        FastAPI + LM Studio (qwen/qwen3-4b-2507) &mdash; Endpoint Test Arayuzu
      </p>

      <div class="status-bar">
        <div id="chip-backend" class="status-chip chip-wait">
          <span class="dot"></span>Backend: kontrol ediliyor...
        </div>
        <div id="chip-lm" class="status-chip chip-wait">
          <span class="dot"></span>LM Studio: kontrol ediliyor...
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('tab-transcript')">
          Transcript Analizi
        </div>
        <div class="tab" onclick="switchTab('tab-mulakat')">
          Mulakat Degerlendirme
        </div>
      </div>

      <!-- TRANSCRIPT PANEL -->
      <div id="tab-transcript" class="panel active">
        <label>JSON Dosya Yolu (tam yol)</label>
        <input
          type="text"
          id="json_path"
          placeholder="C:\...\sample_transcript.json"
        />
        <div class="btn-group">
          <button
            class="btn btn-primary"
            id="btn-transcript"
            onclick="runTranscript()"
          >
            Analiz Baslat
          </button>
          <button class="btn btn-secondary" onclick="fillSamplePath()">
            Ornek Dosya Yolu Doldur
          </button>
        </div>
        <div id="result-transcript" class="result-area">
          <span class="label">Sonuc burada gorunecek</span>
        </div>
      </div>

      <!-- MULAKAT PANEL -->
      <div id="tab-mulakat" class="panel">
        <div class="row">
          <div>
            <label>User ID</label
            ><input type="text" id="m_userId" value="test-user-001" />
          </div>
          <div>
            <label>Email</label
            ><input type="email" id="m_email" value="elif.demir@test.com" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Ad</label><input type="text" id="m_firstName" value="Elif" />
          </div>
          <div>
            <label>Soyad</label
            ><input type="text" id="m_lastName" value="Demir" />
          </div>
        </div>
        <label>Transcript Dosya Yolu (tam yol)</label>
        <input
          type="text"
          id="m_transcriptPath"
          placeholder="C:\...\sample_transcript.json"
        />
        <div class="btn-group">
          <button
            class="btn btn-primary"
            id="btn-mulakat"
            onclick="runMulakat()"
          >
            Degerlendirme Baslat
          </button>
          <button class="btn btn-secondary" onclick="fillSamplePathMulakat()">
            Ornek Dosya Yolu Doldur
          </button>
        </div>
        <div id="result-mulakat" class="result-area">
          <span class="label">Sonuc burada gorunecek</span>
        </div>
      </div>
    </div>

    <script>
      const API = "http://127.0.0.1:8000";

      // Tab switching
      function switchTab(id) {
        document
          .querySelectorAll(".panel")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        event.target.classList.add("active");
      }

      // Health check
      async function checkHealth() {
        const be = document.getElementById("chip-backend");
        const lm = document.getElementById("chip-lm");
        try {
          const r = await fetch(API + "/health");
          const d = await r.json();
          be.className = "status-chip chip-ok";
          be.innerHTML =
            '<span class="dot"></span>Backend: calisiyor (port 8001)';
          if (d.lm_studio === "connected") {
            lm.className = "status-chip chip-ok";
            lm.innerHTML = '<span class="dot"></span>LM Studio: bagli';
          } else {
            lm.className = "status-chip chip-err";
            lm.innerHTML = '<span class="dot"></span>LM Studio: ulasilamiyor';
          }
        } catch (e) {
          be.className = "status-chip chip-err";
          be.innerHTML = '<span class="dot"></span>Backend: ulasilamiyor';
          lm.className = "status-chip chip-err";
          lm.innerHTML = '<span class="dot"></span>LM Studio: bilinmiyor';
        }
      }

      // Timer
      function startTimer(el) {
        const start = Date.now();
        const timerSpan = document.createElement("span");
        timerSpan.className = "timer";
        el.appendChild(timerSpan);
        const iv = setInterval(() => {
          const s = ((Date.now() - start) / 1000).toFixed(1);
          timerSpan.textContent = s + "s";
        }, 100);
        return { stop: () => clearInterval(iv) };
      }

      function fillSamplePath() {
        // Auto-detect path
        const samplePath = API.replace("http://127.0.0.1:8000", "") || "";
        document.getElementById("json_path").value =
          document.location.href.includes("file:")
            ? document.location.href
                .replace("file:///", "")
                .replace(
                  "/frontend_test.html",
                  "\\test_data\\sample_transcript.json",
                )
                .replaceAll("/", "\\")
            : "test_data/sample_transcript.json";
      }

      function fillSamplePathMulakat() {
        document.getElementById("m_transcriptPath").value =
          document.getElementById("json_path").value ||
          (document.location.href.includes("file:")
            ? document.location.href
                .replace("file:///", "")
                .replace(
                  "/frontend_test.html",
                  "\\test_data\\sample_transcript.json",
                )
                .replaceAll("/", "\\")
            : "test_data/sample_transcript.json");
      }

      function renderJSON(data) {
        return JSON.stringify(data, null, 2);
      }

      function renderTranscriptResult(data) {
        if (!data.success)
          return "❌ HATA: " + (data.error || "Bilinmeyen hata");
        let out = "✅ BASARILI\n\n";
        out += "📂 JSON Path: " + (data.json_path || "-") + "\n";
        out += "🏷️ Tur: " + (data.context_type || "-") + "\n";
        out +=
          "📝 Transcript TXT: " + (data.transcript_txt_path || "-") + "\n\n";
        out += "═══════════════════════════════════════\n";
        out += "📋 OZET:\n";
        out += "═══════════════════════════════════════\n\n";
        out += (data.summary || data.summary_error || "Ozet yok") + "\n";
        return out;
      }

      function renderMulakatResult(data) {
        if (!data.success)
          return "❌ HATA: " + (data.error || "Bilinmeyen hata");
        let out = "✅ BASARILI\n\n";
        out += "👤 Aday: " + data.firstName + " " + data.lastName + "\n";
        out += "📧 Email: " + data.email + "\n";
        out +=
          "⏱️ Toplam Sure: " +
          data.totalTime +
          "s (" +
          data.totalTimeMinutes +
          " dk)\n";
        out +=
          "📡 Webhook: " +
          (data.webhookSent ? "Gonderildi" : "Gonderilmedi") +
          "\n\n";

        const sections = [
          ["📊 PUANLAMA TABLOSU", data.puanlamaTablosu],
          ["📝 RECRUITER NOTU", data.recruiterNotu],
          ["💻 TEKNIK YETKINLIK", data.teknikYetkinlik],
          ["🤝 SOFT SKILL ANALIZI", data.softSkillAnalizi],
        ];
        for (const [title, content] of sections) {
          out += "═══════════════════════════════════════\n";
          out += title + "\n";
          out += "═══════════════════════════════════════\n\n";
          out += (content || "(Sonuc alinamadi)") + "\n\n";
        }

        if (data.tasks) {
          out += "─── TASK DURUMLARI ───\n";
          for (const [k, v] of Object.entries(data.tasks)) {
            out +=
              k +
              ": " +
              v.status +
              " (" +
              v.duration +
              "s)" +
              (v.error ? " - " + v.error : "") +
              "\n";
          }
        }
        return out;
      }

      // Transcript endpoint
      async function runTranscript() {
        const btn = document.getElementById("btn-transcript");
        const res = document.getElementById("result-transcript");
        const path = document.getElementById("json_path").value.trim();
        if (!path) {
          res.textContent = "⚠️ Lutfen bir JSON dosya yolu girin";
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Analiz ediliyor...';
        res.className = "result-area";
        res.textContent =
          "⏳ AI analiz yapiliyor, bu islem 1-3 dakika surebilir...\n";
        const timer = startTimer(res);

        try {
          const r = await fetch(
            API + "/chat/analyze-json-transcript-with-summary/",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ json_path: path }),
            },
          );
          const data = await r.json();
          timer.stop();
          res.textContent =
            renderTranscriptResult(data) +
            "\n\n─── RAW JSON ───\n" +
            renderJSON(data);
          res.className = "result-area " + (data.success ? "success" : "error");
        } catch (e) {
          timer.stop();
          res.textContent = "❌ BAGLANTI HATASI: " + e.message;
          res.className = "result-area error";
        }
        btn.disabled = false;
        btn.innerHTML = "Analiz Baslat";
      }

      // Mulakat endpoint
      async function runMulakat() {
        const btn = document.getElementById("btn-mulakat");
        const res = document.getElementById("result-mulakat");

        const body = {
          userId: document.getElementById("m_userId").value.trim(),
          firstName: document.getElementById("m_firstName").value.trim(),
          lastName: document.getElementById("m_lastName").value.trim(),
          email: document.getElementById("m_email").value.trim(),
          transcriptPath: document
            .getElementById("m_transcriptPath")
            .value.trim(),
        };
        if (!body.transcriptPath) {
          res.textContent = "⚠️ Lutfen transcript dosya yolu girin";
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Degerlendiriliyor...';
        res.className = "result-area";
        res.textContent =
          "⏳ 4 paralel AI analizi yapiliyor, bu islem 5-15 dakika surebilir...\n";
        const timer = startTimer(res);

        try {
          const r = await fetch(API + "/chat/mulakat-degerlendirme/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const data = await r.json();
          timer.stop();
          res.textContent =
            renderMulakatResult(data) +
            "\n\n─── RAW JSON ───\n" +
            renderJSON(data);
          res.className = "result-area " + (data.success ? "success" : "error");
        } catch (e) {
          timer.stop();
          res.textContent = "❌ BAGLANTI HATASI: " + e.message;
          res.className = "result-area error";
        }
        btn.disabled = false;
        btn.innerHTML = "Degerlendirme Baslat";
      }

      // Init
      checkHealth();
      setInterval(checkHealth, 15000);
    </script>
  </body>
</html>
